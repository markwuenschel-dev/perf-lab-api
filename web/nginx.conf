server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # SPA catch-all: unknown paths return index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets (JS/CSS chunks have content-hash names) — cache forever
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML shell — it must always be fresh so new deploys take effect
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
