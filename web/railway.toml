# Railway deploy config for the perf-lab-web frontend (React/Vite SPA).
#
# This service lives in the web/ subdirectory of the perf-lab-api monorepo.
# On Railway, point the service root at /web and it will pick up this file.
#
# Required build variable (set in Railway → Variables tab):
#   VITE_API_BASE_URL = https://<your-backend-service>.up.railway.app
#
# The backend service must also have ALLOWED_ORIGINS (or ALLOWED_ORIGIN_REGEX)
# updated to include this service's Railway URL — see app/core/config.py.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
