# Railway deploy config for perf-lab-api (the FastAPI backend).
#
# Default build target `backend` is API-only (no Node stage) — use this when the
# frontend is a separate Railway service (web/railway.toml).
#
# Monolith deploy (API serves the SPA from /static): set build target to
# `backend-with-frontend` and provide VITE_API_BASE_URL as a build variable.
#
# Migrations run on boot (`alembic upgrade head` in Dockerfile CMD).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildTarget = "backend"

[deploy]
# /ping is the app's health endpoint (see app/main.py).
healthcheckPath = "/ping"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
