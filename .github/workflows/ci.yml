name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Newer pushes to the same branch/PR cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'app/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'openapi.json'
              - 'alembic/**'
            web:
              - 'web/**'
              # The frontend types are generated from the contract — regenerate +
              # check them whenever the committed OpenAPI changes (INT-08).
              - 'openapi.json'

  # Contract gate + tests + lint in one job: single uv install, parallel checks.
  python:
    name: Python (contract + tests + lint)
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      needs.changes.outputs.python == 'true'
    services:
      # Integration tests run migrations against a real Postgres, matching prod.
      # The suite fails loudly if this is unreachable — it no longer skips.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: perfuser
          POSTGRES_PASSWORD: perfpass123
          POSTGRES_DB: perflab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perfuser"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://perfuser:perfpass123@localhost:5432/perflab_test
      DATABASE_URL: postgresql+asyncpg://perfuser:perfpass123@localhost:5432/perflab_test
      # The DB-backed suite must actually run here — a connectivity failure is a hard
      # error, not a silent skip that lets integration tests go green (INT-23).
      REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: uv sync --frozen --extra dev

      - name: Restore tool caches
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: tool-cache-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            tool-cache-${{ runner.os }}-py3.12-

      - name: App boots (import smoke test)
        run: uv run python -c "import app.main; print('app.main imported OK')"

      - name: OpenAPI is committed and current
        run: uv run python -m app.scripts.export_openapi --check

      - name: Run pytest, ruff, and pyright in parallel
        run: |
          set -euo pipefail
          uv run python -m pytest -q --cov --cov-report=term-missing --cov-fail-under=83 &
          pid_pytest=$!
          uv run ruff check . &
          pid_ruff=$!
          uv run pyright &
          pid_pyright=$!
          status=0
          wait "$pid_pytest" || status=1
          wait "$pid_ruff" || status=1
          wait "$pid_pyright" || status=1
          exit "$status"

  # Frontend gate: the production build (tsc -b + vite build) must be green.
  # Lint is non-blocking — 3 pre-existing react-refresh warnings in generated
  # shadcn UI files are known / out of scope (keep regressions visible, don't block).
  web:
    name: Web (build + lint)
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      needs.changes.outputs.web == 'true'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Restore Vite cache
        uses: actions/cache@v4
        with:
          path: web/node_modules/.cache
          key: vite-cache-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            vite-cache-${{ runner.os }}-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: types.gen.ts is current (regenerated from openapi.json)
        run: |
          pnpm run gen:types
          git diff --exit-code src/types.gen.ts \
            || (echo "::error::src/types.gen.ts is stale — run 'pnpm run gen:types' and commit." && exit 1)

      - name: Build (tsc + vite)
        run: pnpm run build

      - name: Lint (non-blocking)
        run: pnpm run lint
        continue-on-error: true
