name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same branch/PR cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The contract gate: the app must import (catches the un-bootable-main class of
  # bug that left main un-deployable for ~3 weeks), the OpenAPI schema must
  # generate, and the committed openapi.json must match the code. This is what
  # keeps the web app's generated types (src/types.gen.ts) honest.
  contract:
    name: API contract (boot + OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: App boots (import smoke test)
        run: python -c "import app.main; print('app.main imported OK')"
      - name: OpenAPI is committed and current
        run: python -m app.scripts.export_openapi --check

  # Blocking: the suite is green on Python 3.11. DB-backed tests are deselected
  # here (no Postgres service in CI) and covered separately.
  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run test suite (excluding DB-backed tests)
        run: python -m pytest -q -m "not requires_db"

  # Lint + strict type gate. Both are clean (ruff 0, mypy --strict 0) — keep them so.
  lint:
    name: Lint & types (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (strict type-check)
        run: mypy app

  # Frontend gate: the production build (tsc -b + vite build) must be green.
  # Lint is non-blocking — 3 pre-existing react-refresh warnings in generated
  # shadcn UI files are known / out of scope (keep regressions visible, don't block).
  web:
    name: Web (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build (tsc + vite)
        run: npm run build
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
