services:
  postgres:
    image: postgres:16-alpine
    container_name: perf-lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: perfuser
      POSTGRES_PASSWORD: perfpass123
      POSTGRES_DB: perflab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfuser"]
      interval: 3s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: perf-lab-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://perfuser:perfpass123@postgres:5432/perflab

volumes:
  postgres_data: