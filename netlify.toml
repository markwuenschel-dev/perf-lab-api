# Repo-root Netlify config for the monorepo.
# The frontend lives in web/ (folded in via subtree), so Netlify must build
# from there rather than the repo root. `publish` is relative to `base`.
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback so client-side routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
